{% extends 'base.html' %}

{% block content %}
<div class="card p-4 shadow-sm">
    <h1>Settings</h1>
    {% if section == 'notifications' %}
        <p>Update your notification preferences.</p>
        <form method="post" action="{{ url_for('main.settings_notifications') }}">
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="emailNotifications" name="email_notifications" {% if preferences.email_notifications %}checked{% endif %}>
                <label class="form-check-label" for="emailNotifications">Email notifications</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="smsAlerts" name="sms_alerts" {% if preferences.sms_alerts %}checked{% endif %}>
                <label class="form-check-label" for="smsAlerts">SMS alerts</label>
            </div>
            <button type="submit" class="btn btn-primary">Save preferences</button>
        </form>
    {% else %}
        <p>Site settings are shown here. Use the links below to update your preferences.</p>
        <ul>
            <li><a href="{{ url_for('main.settings_notifications') }}">Notification preferences</a></li>
        </ul>
    {% endif %}
</div>
{% endblock %}
